<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito</title>
    <link rel="stylesheet" href="simulador.css">
</head>
<body>
    <p>CrediEcuador</p>
    <img src="img/logo credito.png" alt="Logo de entidad de credito IA">
 
    <div class="container">
        <h1>Simulador de Crédito</h1>
 
        <h2>Datos financieros</h2>
        <label for="txtIngresos">Ingresos:</label>
        <input type="text" id="txtIngresos" onblur="validarInput(this)">
        <div id="error-txtIngresos" class="mensaje-error"></div>

        <label for="txtArriendo">Arriendo:</label>
        <input type="text" id="txtArriendo" onblur="validarInput(this)">
        <div id="error-txtArriendo" class="mensaje-error"></div>
        
        <label for="txtAlimentación">Alimentación:</label>
        <input type="text" id="txtAlimentación" onblur="validarInput(this)">
        <div id="error-txtAlimentación" class="mensaje-error"></div>

        <label for="txtVarios">Varios:</label>
        <input type="text" id="txtVarios" onblur="validarInput(this)">
        <div id="error-txtVarios" class="mensaje-error"></div>
        
        <p>Gastos: <span id="spnGastos" ></span></p>
        <p>Disponible: <span id="spnDisponible" ></span></p>
        <p>Capacidad de pago mensual: <span id="spnCapacidadPago"></span></p>
 
        <h2>Solicitud de crédito</h2>
        <label for="txtMonto">Monto:</label>
        <input type="text" id="txtMonto" onblur="validarInput(this)">
        <div id="error-txtMonto" class="mensaje-error"></div>
 
        <label for="txtPlazo">Plazo en años:</label>
        <input type="text" id="txtPlazo" onblur="validarInput(this)">
        <div id="error-txtPlazo" class="mensaje-error"></div>
 
        <label for="txtTasaInteres">Tasa de interés:</label>
        <input type="text" id="txtTasaInteres" onblur="validarInput(this)">
        <div id="error-txtTasaInteres" class="mensaje-error"></div>
 
        <p>Interés a pagar: <span id="spnInteresPagar"></span></p>
        <p>Contribución a SOLCA: <span>100</span></p>
        <p>Total préstamo: <span id="spnTotalPrestamo"></span></p>
        <p>Cuota mensual: <span id="spnCuotaMensual"></span></p>
        <p>Estado de crédito: <span id="spnEstadoCredito">ANALIZANDO...</span></p>
 
        <div class="buttons">
            <button id="btnCalcularCredito" onclick="calcular()">Calcular Crédito</button>
            <button id="btnReiniciar" onclick="reiniciar();">Reiniciar</button>
        </div>
    </div>
 
 <script src="simulador.js"></script>
 <script src="funciones.js"></script>
</body>
</html>
